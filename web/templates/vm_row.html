<tr id="vm-row-{{.Name}}">
    <td class="px-6 py-4 whitespace-nowrap">
        <a href="/vms/{{.Name}}" class="text-blue-600 hover:text-blue-800 font-medium">{{.Name}}</a>
        <div class="text-xs text-gray-400">{{.ID}}</div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="badge badge-{{.State}}">{{.State}}</span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{.CPUs}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{.MemoryMB}} MB</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{if .IPAddress}}{{.IPAddress}}{{else}}-{{end}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.CreatedAt.Format "2006-01-02 15:04"}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
        {{if eq (printf "%s" .State) "running"}}
        <button hx-post="/vms/{{.Name}}/stop" hx-target="#vm-row-{{.Name}}" hx-swap="outerHTML"
            class="text-yellow-600 hover:text-yellow-800 font-medium mr-3">Stop</button>
        {{else if or (eq (printf "%s" .State) "stopped") (eq (printf "%s" .State) "created")}}
        <button hx-post="/vms/{{.Name}}/start" hx-target="#vm-row-{{.Name}}" hx-swap="outerHTML"
            class="text-green-600 hover:text-green-800 font-medium mr-3">Start</button>
        {{end}}
        <button hx-delete="/vms/{{.Name}}" hx-target="#vm-row-{{.Name}}" hx-swap="outerHTML"
            hx-confirm="Are you sure you want to delete VM '{{.Name}}'?"
            class="text-red-600 hover:text-red-800 font-medium">Delete</button>
    </td>
</tr>
