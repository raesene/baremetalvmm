name: Build Kubernetes Rootfs

on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes version (e.g. 1.36.0). Leave empty to build latest patch of last 4 minor versions.'
        required: false
        default: ''
      base_image:
        description: 'Docker base image (e.g. ubuntu:24.04)'
        required: false
        default: 'ubuntu:24.04'
  push:
    paths:
      - 'scripts/build-k8s-rootfs.sh'
      - '.github/workflows/build-k8s-rootfs.yml'
    branches:
      - main
  schedule:
    # Weekly on Monday at 08:00 UTC (after kernel and rootfs builds)
    - cron: '0 8 * * 1'

permissions:
  contents: write

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - name: Resolve Kubernetes versions to build
        id: versions
        run: |
          INPUT_VERSION="${{ github.event.inputs.k8s_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            # Manual single-version build
            echo "matrix={\"k8s_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
            echo "Building single version: $INPUT_VERSION"
          else
            # Resolve latest patch for the last 4 minor versions
            # First, get the latest stable to determine the current minor
            LATEST=$(curl -sL https://dl.k8s.io/release/stable.txt | sed 's/^v//')
            if [ -z "$LATEST" ]; then
              echo "Failed to determine latest Kubernetes version"
              exit 1
            fi
            CURRENT_MINOR=$(echo "$LATEST" | cut -d. -f2)
            echo "Current latest stable: $LATEST (minor: $CURRENT_MINOR)"

            VERSIONS="["
            FIRST=true
            for i in 0 1 2 3; do
              MINOR=$((CURRENT_MINOR - i))
              VERSION=$(curl -sL "https://dl.k8s.io/release/stable-1.${MINOR}.txt" | sed 's/^v//')
              if [ -z "$VERSION" ]; then
                echo "Warning: could not resolve stable version for 1.${MINOR}, skipping"
                continue
              fi
              echo "Resolved 1.${MINOR} -> $VERSION"
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                VERSIONS+=","
              fi
              VERSIONS+="\"$VERSION\""
            done
            VERSIONS+="]"

            echo "matrix={\"k8s_version\":$VERSIONS}" >> "$GITHUB_OUTPUT"
            echo "Version matrix: $VERSIONS"
          fi

  build:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    env:
      BASE_IMAGE: ${{ github.event.inputs.base_image || 'ubuntu:24.04' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine release tag
        id: tag
        run: |
          K8S_VERSION="${{ matrix.k8s_version }}"
          TAG="k8s-rootfs-${K8S_VERSION}"
          echo "version=$K8S_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building Kubernetes $K8S_VERSION (tag: $TAG)"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping build"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist, proceeding with build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Kubernetes rootfs
        if: steps.check_release.outputs.exists == 'false'
        run: |
          chmod +x scripts/build-k8s-rootfs.sh
          sudo bash scripts/build-k8s-rootfs.sh \
            --k8s-version "${{ steps.tag.outputs.version }}" \
            --base-image "$BASE_IMAGE" \
            --name k8s-rootfs.ext4 \
            --size 2048 \
            --output "${{ github.workspace }}"

      - name: Generate checksum
        if: steps.check_release.outputs.exists == 'false'
        run: |
          sha256sum k8s-rootfs.ext4.gz > k8s-rootfs.ext4.gz.sha256

      - name: Create GitHub release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          K8S_VERSION="${{ steps.tag.outputs.version }}"
          TITLE="Kubernetes $K8S_VERSION Rootfs (Ubuntu 24.04, kubeadm pre-installed)"
          NOTES="Firecracker-compatible Ubuntu 24.04 rootfs with Kubernetes $K8S_VERSION pre-installed for fast cluster creation.

          **Use this rootfs for Kubernetes clusters** (\`vmm cluster create\`). For standalone VMs, use the \`rootfs-24.04-*\` release instead.

          Pre-configured with:
          - systemd init system
          - OpenSSH server (root key-only login)
          - containerd (SystemdCgroup enabled)
          - kubeadm, kubelet, kubectl $K8S_VERSION
          - iproute2, iputils-ping, dbus, kmod
          - Serial console on ttyS0
          - systemd-networkd
          - Kubernetes sysctl and module configuration

          **Pair with**: \`k8s-kernel-*\` (Kubernetes VM Kernel, Linux 6.6 LTS with Cilium/BPF support)

          Quick start:
          \`\`\`
          # Auto-detected by vmm cluster create
          sudo vmm cluster create mycluster --kernel k8s-kernel --ssh-key ~/.ssh/id_ed25519.pub

          # Or download manually
          gunzip k8s-rootfs.ext4.gz
          sudo mv k8s-rootfs.ext4 /var/lib/vmm/images/rootfs/k8s-${K8S_VERSION}.ext4
          \`\`\`

          Built from \`$BASE_IMAGE\` by GitHub Actions using \`scripts/build-k8s-rootfs.sh\`."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            k8s-rootfs.ext4.gz \
            k8s-rootfs.ext4.gz.sha256
